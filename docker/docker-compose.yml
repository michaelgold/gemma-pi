services:
  pi-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: gemma-pi-agent:latest
    gpus: all
    stdin_open: true
    tty: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_TOKEN=${HF_TOKEN:-}
      - LLAMA_PORT=8001
    volumes:
      - ../workspace:/workspace
      - ../models:/models
    ports:
      - "8001:8001"
